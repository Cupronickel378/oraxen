name: Manual Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Gradle
        run: ./gradlew build
     - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Oraxen-All-Platforms
          path: "**/build/libs/*.jar"
