name: Build Oraxen Reliable
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        # Используем обычный build, но игнорируем мелкие ошибки проверок
        run: ./gradlew build -x test -x check --no-daemon

      - name: Prepare Artifacts
        run: |
          mkdir -p final_output
          # Ищем все тяжелые JAR файлы, которые обычно являются плагинами
          find . -name "*.jar" -size +2M ! -path "*/build/libs/*-dev.jar" ! -path "*/build/libs/*-sources.jar" -exec cp {} ./final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Oraxen-Final-Jars
          path: final_output/
